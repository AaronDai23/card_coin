    implementation 'com.google.android.gms:play-services-ads-identifier:18.1.0'
}

//Protobuf
wire {
    sourcePath {
        srcDir 'src/main/kotlin/com/cardcoin/card_coin/flutter/blockchains/tron/proto'

    }       
    kotlin {}
}
