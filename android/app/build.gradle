plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
    id "org.jetbrains.kotlin.android"
    id "com.squareup.wire"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.cardcoin.card_coin"
    compileSdkVersion 36
    buildToolsVersion "34.0.0"
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }


    sourceSets {
        main.java.srcDirs += [
            'src/main/kotlin',
            '../../../../chipcore_sdk/chipcore_sdk/android/app/src/main/kotlin'
        ]
        main.jniLibs.srcDirs = ["src/main/libs"]
    }
    lintOptions {
        // 如打包出现Failed to transform libs.jar to match attributes
        checkReleaseBuilds false
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.cardcoin.bestwish_lite"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        multiDexEnabled true
        minSdkVersion 24
        targetSdkVersion 36

        versionCode 296
        versionName '2.2.2'
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
            //, 'x86', 'armeabi-v7a', 'x86_64', 'arm64-v8a’
        }
    }

    packagingOptions {
        jniLibs.useLegacyPackaging = false
        exclude 'lib/x86_64/darwin/libscrypt.dylib'
    }

    flavorDimensions "app"
    productFlavors {
        card_coin {
            dimension "app"
            versionCode 58
     
        }

        card_coin_pro {
            dimension "app"
            versionCode 300
            applicationId "com.cardcoin.bestwish"

        }

        card_coin_google {
            dimension "app"
            applicationId "com.cardcoin.lite"

        }

        best_wish {
            dimension "app"
            applicationId "com.cardcoin.bestwish"

        }

    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            minifyEnabled true //删除无用代码
            shrinkResources true //删除无用资源
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    buildFeatures{
        dataBinding = true
        buildConfig = true
        // for view binding :
        // viewBinding = true
    }
    lint {
        disable 'InvalidPackage'
    }
}

flutter {
    source '../..'
}

dependencies {
    // blockchain 模块已移除（源码未实际使用）
//    implementation 'com.tangem.tangem-sdk-kotlin:core:develop-278'
//    implementation 'com.tangem.tangem-sdk-kotlin:android:develop-278'
