name: iOS Build & Archive

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      export_method:
        description: '打包方式'
        required: true
        default: 'app-store'
        type: choice
        options:
          - app-store
          - ad-hoc
          - development

# ─────────────────────────────────────────────────────────────────────────────
# 所需 GitHub Secrets（在仓库 Settings → Secrets and variables → Actions 中配置）
#
#   IOS_CERTIFICATE_BASE64       - 发布证书 .p12 文件的 Base64 内容
#                                  生成方式: base64 -i Certificates.p12 | pbcopy
#   IOS_CERTIFICATE_PASSWORD     - .p12 证书密码
#   KEYCHAIN_PASSWORD            - 临时 Keychain 密码（任意字符串即可）
#   APP_STORE_CONNECT_KEY_ID     - App Store Connect API Key ID
#   APP_STORE_CONNECT_ISSUER_ID  - App Store Connect Issuer ID
#   APP_STORE_CONNECT_KEY_BASE64 - .p8 私钥文件的 Base64 内容
#                                  生成方式: base64 -i AuthKey_XXXX.p8 | pbcopy
#   DOTENV_BASE64                - 项目根目录 .env 文件的 Base64 内容
#                                  生成方式: base64 -i .env | pbcopy
#   CODING_NET_USERNAME          - e.coding.net 用户名
#   CODING_NET_PASSWORD          - e.coding.net 访问密码或访问令牌
# ─────────────────────────────────────────────────────────────────────────────

env:
  FLUTTER_VERSION: '3.44.1'
  XCODE_WORKSPACE: ios/Runner.xcworkspace
  XCODE_SCHEME: Runner
  XCODE_CONFIGURATION: Release
  BUNDLE_ID: com.cardbase.app
  # Xcode 26.3 已预装在 macos-15 runner 上（无需换镜像）
  XCODE_VERSION: '26.3'

jobs:
  build-ios:
    name: Build & Archive iOS
    runs-on: macos-15

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 指定 Xcode 版本 ────────────────────────────────────────────────────
      # macos-15 runner 预装了 Xcode 26.3/26.2/26.1.1/26.0.1（默认仍是 16.4）
      # 此步骤显式切换到 Xcode 26.3，并固定版本避免 runner 升级后受影响
      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app
          xcodebuild -version

      # ── 3. 安装 Flutter ───────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Configure git credentials for coding.net
        env:
          CODING_NET_USERNAME: ${{ secrets.CODING_NET_USERNAME }}
          CODING_NET_PASSWORD: ${{ secrets.CODING_NET_PASSWORD }}
        run: |
          if [ -z "$CODING_NET_USERNAME" ] || [ -z "$CODING_NET_PASSWORD" ]; then
            echo "Missing CODING_NET_USERNAME or CODING_NET_PASSWORD secrets"
            exit 1
          fi

          git config --global url."https://${CODING_NET_USERNAME}:${CODING_NET_PASSWORD}@e.coding.net/".insteadOf "https://e.coding.net/"
          git config --global credential.helper store

      - name: Validate required secrets
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          CODING_NET_USERNAME: ${{ secrets.CODING_NET_USERNAME }}
          CODING_NET_PASSWORD: ${{ secrets.CODING_NET_PASSWORD }}
          DOTENV_BASE64: ${{ secrets.DOTENV_BASE64 }}
        run: |
          missing=()
          for key in \
            IOS_CERTIFICATE_BASE64 \
            IOS_CERTIFICATE_PASSWORD \
            KEYCHAIN_PASSWORD \
            IOS_PROVISIONING_PROFILE_BASE64 \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_KEY_BASE64 \
            CODING_NET_USERNAME \
            CODING_NET_PASSWORD \
            DOTENV_BASE64; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Create .env from secret
        env:
          DOTENV_BASE64: ${{ secrets.DOTENV_BASE64 }}
        run: |
          decode_base64() {
            if base64 --help 2>&1 | grep -q -- '--decode'; then
              base64 --decode
            else
              base64 -D
            fi
          }

          echo -n "$DOTENV_BASE64" | decode_base64 > .env

          if [ ! -s .env ]; then
            echo "::error::.env is empty after decoding DOTENV_BASE64"
            exit 1
          fi

      - name: Flutter pub get
        run: flutter pub get

      # ── 3. CocoaPods 依赖 ─────────────────────────────────────────────────────
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ env.FLUTTER_VERSION }}-${{ hashFiles('ios/Podfile', 'ios/Podfile.lock', 'pubspec.lock', '.flutter-plugins-dependencies') }}

      - name: Install CocoaPods dependencies
        run: |
          # Clean stale iOS integration artifacts so plugin pods (for example app_settings)
          # are recreated from current Flutter dependency metadata on each CI run.
          rm -rf ios/Pods ios/.symlinks ios/Flutter/Flutter.podspec
          flutter pub get
          cd ios
          # Do NOT pass --repo-update: it triggers a full spec refresh + re-resolution
          # which can silently drop external-source pods whose podspec version does not
          # match the pub package version (e.g. app_settings podspec 6.1.2 vs pub 7.0.0).
          # The committed Podfile.lock already encodes the correct resolved set.
          pod install --clean-install
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. 安装 xcpretty ──────────────────────────────────────────────────────
      - name: Install xcpretty
        run: gem install xcpretty --no-document

      # ── 5. 导入签名证书 ───────────────────────────────────────────────────────
      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          decode_base64() {
            if base64 --help 2>&1 | grep -q -- '--decode'; then
              base64 --decode
            else
              base64 -D
            fi
          }

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # 解码证书
          echo -n "$CERTIFICATE_BASE64" | decode_base64 > "$CERTIFICATE_PATH"

          # 创建临时 Keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 导入证书
          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # 将临时 Keychain 加入搜索列表
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # 打印可用签名身份，便于定位证书类型问题
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true

      # ── 6. 导入 Provisioning Profile（手动签名用） ────────────────────────────
      - name: Import provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          decode_base64() {
            if base64 --help 2>&1 | grep -q -- '--decode'; then
              base64 --decode
            else
              base64 -D
            fi
          }

          PROFILE_PATH="$RUNNER_TEMP/distribution.mobileprovision"
          echo -n "$PROVISIONING_PROFILE_BASE64" | decode_base64 > "$PROFILE_PATH"

          # 从 CMS 签名的 mobileprovision 中提取 UUID
          security cms -D -i "$PROFILE_PATH" -o "$RUNNER_TEMP/profile_decoded.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile_decoded.plist")
          echo "Profile UUID: $PROFILE_UUID"
          echo "IOS_PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

          # 校验 profile 是否包含 NFC TAG entitlement，避免生成审核通过但运行时 NFC 不可用的包
          PROFILE_NFC_FORMATS=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.nfc.readersession.formats" "$RUNNER_TEMP/profile_decoded.plist" 2>/dev/null || true)
          if [[ -z "$PROFILE_NFC_FORMATS" || "$PROFILE_NFC_FORMATS" != *"TAG"* ]]; then
            echo "::error::Provisioning Profile missing NFC entitlement com.apple.developer.nfc.readersession.formats=TAG"
            echo "Decoded profile path: $RUNNER_TEMP/profile_decoded.plist"
            exit 1
          fi

          # 校验 profile 的 AppID 与目标 Bundle ID 一致
          PROFILE_APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$RUNNER_TEMP/profile_decoded.plist" 2>/dev/null || true)
          if [[ "$PROFILE_APP_IDENTIFIER" != "G76B76R439.com.cardbase.app" ]]; then
            echo "::error::Provisioning Profile application-identifier mismatch: $PROFILE_APP_IDENTIFIER"
            echo "Expected: G76B76R439.com.cardbase.app"
            exit 1
          fi

          # 安装到 Xcode 标准路径
          PP_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PP_DIR"
          cp "$PROFILE_PATH" "$PP_DIR/$PROFILE_UUID.mobileprovision"

          # 将 UUID 写入 ExportOptions.plist，供 xcodebuild -exportArchive 使用
          /usr/libexec/PlistBuddy \
            -c "Set :provisioningProfiles:com.cardbase.app $PROFILE_UUID" \
            ios/ExportOptions.plist
          echo "ExportOptions.plist updated with UUID: $PROFILE_UUID"

      # ── 7. 配置 App Store Connect API Key（用于上传，可保留） ─────────────────
      - name: Setup App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          decode_base64() {
            if base64 --help 2>&1 | grep -q -- '--decode'; then
              base64 --decode
            else
              base64 -D
            fi
          }

          ASC_KEY_PATH=~/.appstoreconnect/private_keys
          mkdir -p "$ASC_KEY_PATH"
          echo -n "$ASC_KEY_BASE64" | decode_base64 \
            > "$ASC_KEY_PATH/AuthKey_${ASC_KEY_ID}.p8"

      # ── 8. 更新 ExportOptions.plist 打包方式 ─────────────────────────────────
      - name: Set export method
        run: |
          METHOD="${{ github.event.inputs.export_method || 'app-store-connect' }}"
          /usr/libexec/PlistBuddy -c "Set :method $METHOD" ios/ExportOptions.plist
          echo "Export method: $METHOD"

      # ── 9. Archive ────────────────────────────────────────────────────────────
      - name: Build Xcode Archive
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -eo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/Runner.xcarchive"
          ARCHIVE_LOG="$RUNNER_TEMP/xcodebuild-archive.log"
          RESULT_BUNDLE_PATH="$RUNNER_TEMP/Runner.xcresult"
          ASC_KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          if ! xcodebuild \
            -workspace "${{ env.XCODE_WORKSPACE }}" \
            -scheme "${{ env.XCODE_SCHEME }}" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration "${{ env.XCODE_CONFIGURATION }}" \
            -archivePath "$ARCHIVE_PATH" \
            -resultBundlePath "$RESULT_BUNDLE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_ENTITLEMENTS=Runner.entitlements \
            DEVELOPMENT_TEAM=G76B76R439 \
            archive > "$ARCHIVE_LOG" 2>&1; then
            cat "$ARCHIVE_LOG"
            exit 1
          fi

          cat "$ARCHIVE_LOG" | xcpretty

      - name: Validate Archive NFC entitlement
        run: |
          set -eo pipefail
          APP_PATH="$RUNNER_TEMP/Runner.xcarchive/Products/Applications/Runner.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "::error::Archived app not found at $APP_PATH"
            exit 1
          fi

          RAW_ENT="$RUNNER_TEMP/archive-entitlements-raw.plist"
          ENT_XML="$RUNNER_TEMP/archive-entitlements.plist"
          CODESIGN_ERR="$RUNNER_TEMP/archive-codesign.stderr"
          if ! codesign -d --entitlements :- "$APP_PATH" > "$RAW_ENT" 2> "$CODESIGN_ERR"; then
            echo "::error::codesign failed when reading archive entitlements"
            cat "$CODESIGN_ERR"
            exit 1
          fi
          if [[ ! -s "$RAW_ENT" ]]; then
            echo "::error::Archive entitlements output is empty"
            echo "codesign stderr:"
            cat "$CODESIGN_ERR"
            exit 1
          fi
          if ! plutil -lint "$RAW_ENT" >/dev/null 2>&1; then
            echo "::error::Archive entitlements is not a valid plist"
            cat "$RAW_ENT"
            exit 1
          fi

          ENT_XML="$RUNNER_TEMP/archive-entitlements.plist"
          plutil -convert xml1 "$RAW_ENT" -o "$ENT_XML"
          NFC_FORMATS=$(/usr/libexec/PlistBuddy -c "Print :com.apple.developer.nfc.readersession.formats" "$ENT_XML" 2>/dev/null || true)
          if [[ -z "$NFC_FORMATS" || "$NFC_FORMATS" != *"TAG"* ]]; then
            echo "::error::Archive codesign entitlements missing NFC TAG format"
            echo "Archive codesign entitlements:"
            cat "$ENT_XML"
            exit 1
          fi

          echo "Archive NFC entitlement check passed"

      # ── 10. Export IPA ────────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          set -eo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/Runner.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/ipa"
          EXPORT_LOG="$RUNNER_TEMP/xcodebuild-export.log"

          # 使用手动签名（manual signingStyle），不需要 -allowProvisioningUpdates
          # 和 App Store Connect API Key，证书和 Profile 已在前面步骤导入
          if ! xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath "$EXPORT_PATH" \
            > "$EXPORT_LOG" 2>&1; then
            cat "$EXPORT_LOG"
            exit 1
          fi

          cat "$EXPORT_LOG" | xcpretty

      - name: Validate IPA NFC entitlement
        run: |
          set -eo pipefail
          IPA_PATH=$(find "$RUNNER_TEMP/ipa" -maxdepth 1 -name "*.ipa" -print -quit)
          if [[ -z "$IPA_PATH" || ! -f "$IPA_PATH" ]]; then
            echo "::error::IPA not found under $RUNNER_TEMP/ipa"
            exit 1
          fi

          TMP_DIR=$(mktemp -d)
          unzip -q "$IPA_PATH" -d "$TMP_DIR"
          APP_PATH=$(find "$TMP_DIR/Payload" -maxdepth 1 -name "*.app" -print -quit)
          if [[ -z "$APP_PATH" || ! -d "$APP_PATH" ]]; then
            echo "::error::App bundle not found in IPA payload"
            exit 1
          fi

          RAW_ENT="$TMP_DIR/app-entitlements-raw.plist"
          ENT_XML="$TMP_DIR/app-entitlements.plist"
          CODESIGN_ERR="$TMP_DIR/app-codesign.stderr"
          if ! codesign -d --entitlements :- "$APP_PATH" > "$RAW_ENT" 2> "$CODESIGN_ERR"; then
            echo "::error::codesign failed when reading IPA entitlements"
            cat "$CODESIGN_ERR"
            exit 1
          fi
          if [[ ! -s "$RAW_ENT" ]]; then
            echo "::error::IPA entitlements output is empty"
            echo "codesign stderr:"
            cat "$CODESIGN_ERR"
            exit 1
          fi
          if ! plutil -lint "$RAW_ENT" >/dev/null 2>&1; then
            echo "::error::IPA entitlements is not a valid plist"
            cat "$RAW_ENT"
            exit 1
          fi

          plutil -convert xml1 "$RAW_ENT" -o "$ENT_XML"

          NFC_FORMATS=$(/usr/libexec/PlistBuddy -c "Print :com.apple.developer.nfc.readersession.formats" "$ENT_XML" 2>/dev/null || true)
          if [[ -z "$NFC_FORMATS" || "$NFC_FORMATS" != *"TAG"* ]]; then
            echo "::error::IPA codesign entitlements missing NFC TAG format"
            echo "Codesign entitlements:" 
            cat "$ENT_XML"
            exit 1
          fi

          echo "NFC entitlement check passed"

      # ── 11. 上传 IPA 为构建产物 ────────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner-${{ github.run_number }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30

      - name: Upload xcodebuild logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs-${{ github.run_number }}
          path: |
            ${{ runner.temp }}/xcodebuild-archive.log
            ${{ runner.temp }}/xcodebuild-export.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload xcresult bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-${{ github.run_number }}
          path: ${{ runner.temp }}/Runner.xcresult
          if-no-files-found: ignore
          retention-days: 7

      # ── 12. 清理 Keychain ──────────────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8 || true
